<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitcoin QR</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #carpetCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      box-sizing: border-box;
      border: 4px solid #000;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #qr {
      padding: 12px;
      background: #ff0000;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      animation: qr-bg-rainbow 4s linear infinite;
    }

    #qr canvas,
    #qr img {
      display: block;
    }

    .address-text {
      margin: 0;
      color: #fff;
      font-size: 18px;
      line-height: 1.4;
      word-break: break-word;
      max-width: 900px;
      background: rgba(0, 0, 0, 1);
      padding: 8px 12px;
      border-radius: 8px;
    }

    .discord-text {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      margin: 0;
      color: #fff;
      font-size: 16px;
      letter-spacing: 0.2px;
      opacity: 1;
      background: rgba(0, 0, 0, 1);
      padding: 6px 10px;
      border-radius: 8px;
    }

    .steam-text {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      margin: 0;
      color: #fff;
      font-size: 16px;
      letter-spacing: 0.2px;
      opacity: 1;
      background: rgba(0, 0, 0, 1);
      padding: 6px 10px;
      border-radius: 8px;
    }

    .youtube-text {
      position: fixed;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      margin: 0;
      color: #fff;
      font-size: 16px;
      letter-spacing: 0.2px;
      opacity: 1;
      text-decoration: none;
      background: rgba(0, 0, 0, 1);
      padding: 6px 10px;
      border-radius: 8px;
    }

    .youtube-text:hover,
    .youtube-text:focus-visible {
      text-decoration: underline;
    }

    .rainbow {
      animation: rainbow-cycle 4s linear infinite;
      animation-delay: -2s;
    }

    @keyframes rainbow-cycle {
      0% { color: #ff0000; }
      16% { color: #ff7f00; }
      33% { color: #ffff00; }
      50% { color: #00ff00; }
      66% { color: #0000ff; }
      83% { color: #8b00ff; }
      100% { color: #ff0000; }
    }

    @keyframes qr-bg-rainbow {
      0% { background-color: #ff0000; }
      16% { background-color: #ff7f00; }
      33% { background-color: #ffff00; }
      50% { background-color: #00ff00; }
      66% { background-color: #0000ff; }
      83% { background-color: #8b00ff; }
      100% { background-color: #ff0000; }
    }

    @keyframes page-bg-pulse {
      0% { background-color: #000000; }
      47% { background-color: #000000; }
      50% { background-color: #1c7d0a; }
      53% { background-color: #000000; }
      100% { background-color: #000000; }
    }

    .skull-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      background: #000;
      color: #00ff00;
      padding: 16px;
      box-sizing: border-box;
    }

    .skull-overlay--hidden {
      display: none;
    }

    .skull-overlay-stage {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .skull-overlay-pre {
      margin: 0;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.15;
      white-space: pre;
      max-width: none;
      flex-shrink: 0;
      width: max-content;
    }
  </style>
</head>
<body>
  <div id="skullOverlay" class="skull-overlay" aria-hidden="false">
    <div id="skullOverlayStage" class="skull-overlay-stage">
      <pre id="skullOverlayText" class="skull-overlay-pre"></pre>
    </div>
  </div>
  <canvas id="carpetCanvas" aria-hidden="true"></canvas>
  <div class="wrap">
    <div id="qr" aria-label="Bitcoin address QR code"></div>
    <p class="address-text">Receiving address for Bitcoin: <span class="rainbow">bc1qcm2n9zu0x2uvuaxn3q3ua23qhxkgn30csaa5vz</span></p>
  </div>
  <p class="discord-text">Discord: oops_all_warcrimes</p>
  <a class="youtube-text" href="https://www.youtube.com/@Alexandertheso-so" target="_blank" rel="noopener noreferrer">YouTube: https://www.youtube.com/@Alexandertheso-so</a>
  <p class="steam-text">Steam: 1110392789</p>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const skullOverlay = document.getElementById("skullOverlay");
    const skullOverlayStage = document.getElementById("skullOverlayStage");
    const skullOverlayText = document.getElementById("skullOverlayText");
    let skullFrameInterval = null;
    let skullResizeObserver = null;

    function fitSkullOverlayPre() {
      const stage = skullOverlayStage;
      const pre = skullOverlayText;
      const maxW = stage.clientWidth * 0.98;
      const maxH = stage.clientHeight * 0.98;
      if (maxW <= 0 || maxH <= 0 || !pre.textContent.trim()) {
        return;
      }

      let lo = 2;
      let hi = 512;
      for (let k = 0; k < 42; k += 1) {
        const mid = (lo + hi) / 2;
        pre.style.fontSize = `${mid}px`;
        if (pre.scrollWidth <= maxW && pre.scrollHeight <= maxH) {
          lo = mid;
        } else {
          hi = mid;
        }
      }
      pre.style.fontSize = `${lo}px`;
    }

    const hideSkullOverlay = () => {
      if (skullFrameInterval !== null) {
        clearInterval(skullFrameInterval);
        skullFrameInterval = null;
      }
      if (skullResizeObserver !== null) {
        skullResizeObserver.disconnect();
        skullResizeObserver = null;
      }
      skullOverlay.classList.add("skull-overlay--hidden");
      skullOverlay.setAttribute("aria-hidden", "true");
    };

    const hideAfterReloadTimer = setTimeout(hideSkullOverlay, 30000);

    const fetchText = (path) =>
      fetch(path).then((r) => {
        if (!r.ok) throw new Error(String(r.status));
        return r.text();
      });

    Promise.all([fetchText("skull.raw"), fetchText("skull2.raw")])
      .then(([frame1, frame2]) => {
        const frames = [frame1, frame2];
        let i = 0;
        const showFrame = () => {
          skullOverlayText.textContent = frames[i];
          requestAnimationFrame(() => {
            fitSkullOverlayPre();
          });
        };
        showFrame();
        skullFrameInterval = setInterval(() => {
          i = (i + 1) % 2;
          showFrame();
        }, 500);
        skullResizeObserver = new ResizeObserver(() => {
          fitSkullOverlayPre();
        });
        skullResizeObserver.observe(skullOverlayStage);
      })
      .catch(() => {
        clearTimeout(hideAfterReloadTimer);
        hideSkullOverlay();
      });

    const bitcoinAddress = "bc1qcm2n9zu0x2uvuaxn3q3ua23qhxkgn30csaa5vz";
    const carpetCanvas = document.getElementById("carpetCanvas");
    const carpetCtx = carpetCanvas.getContext("2d");
    let carpetOffsetX = 0;
    let carpetOffsetY = 0;
    const qrElement = document.getElementById("qr");

    new QRCode(document.getElementById("qr"), {
      text: bitcoinAddress,
      width: 320,
      height: 320,
      colorDark: "#000000",
      colorLight: "rgba(0,0,0,0)",
      correctLevel: QRCode.CorrectLevel.H
    });

    function carveCarpet(x, y, size, depth) {
      if (depth <= 0) {
        return;
      }

      const third = size / 3;
      carpetCtx.clearRect(x + third, y + third, third, third);

      for (let row = 0; row < 3; row += 1) {
        for (let col = 0; col < 3; col += 1) {
          if (row === 1 && col === 1) {
            continue;
          }
          carveCarpet(x + col * third, y + row * third, third, depth - 1);
        }
      }
    }

    function drawSierpinskiCarpet() {
      const dpr = window.devicePixelRatio || 1;
      const width = window.innerWidth;
      const height = window.innerHeight;

      carpetCanvas.width = Math.floor(width * dpr);
      carpetCanvas.height = Math.floor(height * dpr);
      carpetCanvas.style.width = `${width}px`;
      carpetCanvas.style.height = `${height}px`;

      carpetCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      carpetCtx.clearRect(0, 0, width, height);

      const power = Math.floor(Math.log(Math.max(1, Math.min(width, height))) / Math.log(3));
      const tileSize = Math.max(3, Math.pow(3, Math.max(1, power + 1)));
      const maxDepth = Math.max(1, Math.floor(Math.log(tileSize / 6) / Math.log(3)));

      if (carpetOffsetX === 0 && carpetOffsetY === 0) {
        carpetOffsetX = Math.random() * tileSize;
        carpetOffsetY = Math.random() * tileSize;
      }
      const startX = -carpetOffsetX;
      const startY = -carpetOffsetY;

      carpetCtx.fillStyle = "#1c7d0a";
      for (let y = startY; y < height; y += tileSize) {
        for (let x = startX; x < width; x += tileSize) {
          carpetCtx.fillRect(x, y, tileSize, tileSize);
          carveCarpet(x, y, tileSize, maxDepth);
        }
      }
    }

    drawSierpinskiCarpet();
    window.addEventListener("resize", drawSierpinskiCarpet);

    const rotationRatePerSecond = 0.01;
    let currentRotation = 0;
    let lastFrameTime = performance.now();

    function animateQrRotation(now) {
      const deltaSeconds = (now - lastFrameTime) / 1000;
      lastFrameTime = now;
      currentRotation += rotationRatePerSecond * deltaSeconds;
      qrElement.style.transform = `rotate(${currentRotation}deg)`;
      requestAnimationFrame(animateQrRotation);
    }

    requestAnimationFrame(animateQrRotation);
  </script>
</body>
</html>
