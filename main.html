<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main menu</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      box-sizing: border-box;
    }

    #matrix-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #easter-phrase {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      font: 13px Consolas, "Segoe UI", monospace;
      color: #00cc33;
      text-shadow: 0 0 10px rgba(0, 255, 80, 0.45);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.35s ease;
      max-width: min(96vw, 28em);
    }

    #easter-phrase.show {
      opacity: 1;
    }

    .page {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 28px;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #c8ffc8;
      text-shadow: 0 0 12px rgba(0, 255, 80, 0.35);
    }

    nav {
      width: 100%;
      max-width: 320px;
    }

    .menu {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a,
    .menu button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 14px 18px;
      color: #e8ffe8;
      text-decoration: none;
      background: rgba(0, 12, 4, 0.92);
      border: 1px solid rgba(0, 255, 80, 0.45);
      border-radius: 8px;
      text-align: center;
      transition: background 0.15s ease, border-color 0.15s ease;
      font: inherit;
      cursor: pointer;
    }

    .menu a:hover,
    .menu a:focus-visible,
    .menu button:hover,
    .menu button:focus-visible {
      background: rgba(0, 28, 12, 0.96);
      border-color: rgba(0, 255, 100, 0.65);
      outline: none;
    }

    .menu a[aria-current="page"] {
      border-color: rgba(0, 255, 120, 0.75);
      background: rgba(0, 22, 10, 0.95);
    }
  </style>
</head>
<body>
  <canvas id="matrix-bg" aria-hidden="true"></canvas>
  <div id="easter-phrase" aria-hidden="true">this was totaly not a waste of 100$</div>
  <div class="page">
    <h1>Main menu</h1>
    <nav aria-label="Site">
      <ul class="menu">
        <!-- <li><button type="button" id="dev-easter" aria-label="Dev: show phrase now">Dev</button></li> -->
        <li><a href="index.html">Bitcoin QR</a></li>
        <li><a href="mobile.html">Mobile page</a></li>
      </ul>
    </nav>
  </div>
  <script>
    (function () {
      var canvas = document.getElementById('matrix-bg');
      if (!canvas || !canvas.getContext) return;
      var ctx = canvas.getContext('2d');
      var fontSize = 15;
      var columnWidth = fontSize;
      var chars = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ﾊﾋﾌﾍﾎｦｧｨｩｪｫｬｭｮｯｰアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンАБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯабвгдеёжзийклмнопрстуфхцчшщъыьэюя';
      var drops = [];
      var dirs = [];
      var columns = 0;

      function rollDir() {
        return Math.random() < 0.14 ? -1 : 1;
      }

      function resize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        columns = Math.max(1, Math.ceil(w / columnWidth));
        drops.length = 0;
        dirs.length = 0;
        var rows = Math.ceil(h / fontSize) + 2;
        for (var i = 0; i < columns; i++) {
          dirs[i] = rollDir();
          drops[i] = Math.floor(Math.random() * rows);
        }
      }

      function tick() {
        var w = canvas.width;
        var h = canvas.height;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, w, h);
        ctx.font = fontSize + 'px Consolas, "Segoe UI", "MS Gothic", "Yu Gothic", "Hiragino Kaku Gothic ProN", monospace';
        ctx.textBaseline = 'top';

        var rows = Math.ceil(h / fontSize) + 2;
        for (var i = 0; i < drops.length; i++) {
          var ch = chars.charAt(Math.floor(Math.random() * chars.length));
          var x = i * columnWidth;
          var y = drops[i] * fontSize;
          ctx.fillStyle = Math.random() > 0.96 ? '#d4ffd4' : '#00cc33';
          ctx.fillText(ch, x, y);
          if (dirs[i] < 0) {
            drops[i]--;
            if (drops[i] * fontSize < -fontSize && Math.random() > 0.97) {
              drops[i] = Math.floor(Math.random() * rows);
              dirs[i] = rollDir();
            }
          } else {
            drops[i]++;
            if (y > h && Math.random() > 0.975) {
              drops[i] = Math.floor(Math.random() * rows);
              dirs[i] = rollDir();
            }
          }
        }
      }

      window.addEventListener('resize', resize);
      resize();
      setInterval(tick, 35);
    })();

    (function () {
      var el = document.getElementById('easter-phrase');
      if (!el) return;

      var scheduleTimer = null;
      var phraseHideTimer = null;

      function placeRandom() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var ew = el.offsetWidth || 1;
        var eh = el.offsetHeight || 20;
        var maxLeft = Math.max(8, w - ew - 8);
        var maxTop = Math.max(8, h - eh - 8);
        el.style.left = (maxLeft <= 8 ? 8 : 8 + Math.random() * (maxLeft - 8)) + 'px';
        el.style.top = (maxTop <= 8 ? 8 : 8 + Math.random() * (maxTop - 8)) + 'px';
      }

      function showPhrase(durationMs) {
        if (phraseHideTimer) {
          clearTimeout(phraseHideTimer);
          phraseHideTimer = null;
        }
        el.classList.remove('show');
        void el.offsetWidth;
        placeRandom();
        el.classList.add('show');
        var hideAfter = durationMs != null ? durationMs : 1600 + Math.random() * 2400;
        phraseHideTimer = setTimeout(function () {
          el.classList.remove('show');
          phraseHideTimer = null;
        }, hideAfter);
      }

      function scheduleNext() {
        if (scheduleTimer) {
          clearTimeout(scheduleTimer);
          scheduleTimer = null;
        }
        var delay = 2500 + Math.random() * 9000;
        scheduleTimer = setTimeout(function () {
          scheduleTimer = null;
          el.classList.remove('show');
          void el.offsetWidth;
          if (Math.random() < 0.20) {
            showPhrase();
          }
          scheduleNext();
        }, delay);
      }

      window.addEventListener('resize', function () {
        el.classList.remove('show');
        if (phraseHideTimer) {
          clearTimeout(phraseHideTimer);
          phraseHideTimer = null;
        }
      });

      var devBtn = document.getElementById('dev-easter');
      if (devBtn) {
        devBtn.addEventListener('click', function () {
          if (scheduleTimer) {
            clearTimeout(scheduleTimer);
            scheduleTimer = null;
          }
          showPhrase(1600 + Math.random() * 2400);
          scheduleNext();
        });
      }

      scheduleNext();
    })();
  </script>
</body>
</html>
